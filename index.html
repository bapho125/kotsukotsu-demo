<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コツコツ ｜ 続けられて、見つけてもらえる。</title>
<style>
  :root{
    --bg:#FBF7F0; --card:#fff; --ink:#2E2A26; --mut:#9A8F86;
    --acc:#E0795E; --acc2:#C85B43; --line:#EFE7DC; --soft:#FCEFE8;
    --green:#5FA678; --greenbg:#EAF4ED; --gold:#E0a64e; --goldbg:#FBF1DF;
    --sh:0 10px 30px rgba(92,64,44,.10); --sh2:0 4px 14px rgba(92,64,44,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:clip}
  body{font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;background:#F1E9DC;color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6}
  .phone{max-width:432px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;box-shadow:0 0 50px rgba(92,64,44,.12);display:flex;flex-direction:column}
  .scr{flex:1;padding:22px 18px 110px;overflow-y:auto}
  .view{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .top{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .av{width:46px;height:46px;border-radius:50%;background-size:cover;background-position:center;flex-shrink:0;box-shadow:var(--sh2)}
  .hi{font-size:13px;color:var(--mut);font-weight:700}
  .shop{font-size:18px;font-weight:800;letter-spacing:.01em}

  /* keep-going card */
  .keep{background:linear-gradient(135deg,#fff,#FFF6EE);border:1px solid var(--line);border-radius:22px;padding:16px 17px;box-shadow:var(--sh);margin-bottom:14px}
  .keep .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .streak{font-size:20px;font-weight:800;display:flex;align-items:center;gap:7px}
  .streak .f{font-size:22px}
  .keep .sub{font-size:12px;color:var(--mut);font-weight:700;margin-top:2px}
  .pace{display:flex;gap:6px;align-items:center}
  .dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);background:#fff}
  .dot.on{background:var(--acc);border-color:var(--acc)}
  .keepmsg{font-size:12.5px;font-weight:800;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
  .keepmsg.go{color:var(--acc2)} .keepmsg.ok{color:var(--green)}

  .next{background:linear-gradient(135deg,#fff,#FFF8F3);border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:var(--sh);display:flex;gap:14px;align-items:center;margin-bottom:14px;cursor:pointer}
  .next .ph{width:78px;height:78px;border-radius:18px;background-size:cover;background-position:center;flex-shrink:0;background-color:var(--soft)}
  .next .lab{font-size:11px;color:var(--acc2);font-weight:800;letter-spacing:.04em}
  .next .ttl{font-size:15.5px;font-weight:800;margin:3px 0 5px;line-height:1.35}
  .pill{display:inline-block;background:var(--soft);color:var(--acc2);font-weight:800;font-size:11.5px;padding:3px 10px;border-radius:999px}

  .sechead{font-size:13px;font-weight:800;margin:22px 4px 11px;display:flex;align-items:center;gap:7px}
  .sechead .c{font-size:11px;color:var(--mut);font-weight:700}
  .item{display:flex;gap:13px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:11px;margin-bottom:10px;box-shadow:var(--sh2);cursor:pointer;transition:.14s}
  .item:active{transform:scale(.99)}
  .item .ph{width:54px;height:54px;border-radius:14px;background-size:cover;background-position:center;flex-shrink:0;background-color:var(--soft)}
  .item .t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .m{font-size:12px;color:var(--mut);font-weight:700;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
  .nw{white-space:nowrap}
  .done-badge{font-size:10.5px;font-weight:800;color:var(--green);background:var(--greenbg);padding:2px 8px;border-radius:999px;white-space:nowrap}
  .reach-badge{font-size:10.5px;font-weight:800;color:var(--acc2);background:var(--soft);padding:2px 8px;border-radius:999px;white-space:nowrap}
  .empty{text-align:center;color:var(--mut);font-size:13px;font-weight:700;padding:22px 12px}

  .addbtn{position:fixed;left:50%;transform:translateX(-50%);bottom:86px;z-index:30;background:var(--acc);color:#fff;border:none;font-family:inherit;font-weight:800;font-size:15px;padding:14px 26px;border-radius:999px;box-shadow:0 10px 24px rgba(224,121,94,.45);cursor:pointer;display:flex;align-items:center;gap:8px}
  .addbtn:active{transform:translateX(-50%) scale(.97)}

  /* growth */
  .bignum{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:22px 20px;box-shadow:var(--sh);text-align:center;margin-bottom:14px}
  .bignum .n{font-size:46px;font-weight:800;letter-spacing:-.01em;line-height:1}
  .bignum .u{font-size:14px;color:var(--mut);font-weight:800;margin-left:4px}
  .bignum .d{margin-top:9px;display:inline-flex;align-items:center;gap:5px;background:var(--greenbg);color:var(--green);font-weight:800;font-size:13px;padding:5px 13px;border-radius:999px}
  .bignum .cap{font-size:12px;color:var(--mut);font-weight:700;margin-top:11px}
  .twocard{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:11px;margin-bottom:14px}
  .mini{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:var(--sh2);text-align:center}
  .mini .mn{font-size:26px;font-weight:800;line-height:1}
  .mini .ml{font-size:11.5px;color:var(--mut);font-weight:800;margin-top:5px}
  .mini .me{font-size:18px}
  .chartcard{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px 16px 10px;box-shadow:var(--sh2);margin-bottom:8px}
  .chartcard .lab{font-size:12px;color:var(--mut);font-weight:800;margin-bottom:6px}
  .topimg{width:60px;height:60px;border-radius:14px;background-size:cover;background-position:center;flex-shrink:0;background-color:var(--soft);position:relative}
  .rank{position:absolute;top:-7px;left:-7px;width:23px;height:23px;border-radius:50%;background:var(--acc);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh2)}
  .seen{font-size:14px;font-weight:800}.seen b{color:var(--acc2)}
  .insight{background:var(--soft);border-radius:18px;padding:15px 16px;font-size:13.5px;font-weight:700;color:var(--acc2);line-height:1.7;margin-top:14px}
  .insight .e{font-size:18px}
  .actbtn{margin-top:12px;width:100%;background:var(--acc);color:#fff;border:none;font-family:inherit;font-weight:800;font-size:14px;padding:13px;border-radius:14px;cursor:pointer}

  .tabbar{position:sticky;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:20}
  .tab{flex:1;border:none;background:none;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--mut);font-weight:800;font-size:11.5px;padding:5px 0;transition:.14s}
  .tab .ic{font-size:21px;line-height:1}.tab.on{color:var(--acc)}

  .ov{position:fixed;inset:0;background:rgba(46,42,38,.42);display:none;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
  .ov.show{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:432px;border-radius:26px 26px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:94vh;overflow:auto;box-shadow:0 -12px 40px rgba(46,42,38,.2);animation:up .28s ease}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .sheet h3{font-size:19px;font-weight:800;margin-bottom:4px}
  .sheet .shsub{font-size:12px;color:var(--mut);font-weight:700;margin-bottom:16px}
  .f{margin-bottom:15px}
  .f label{font-size:12.5px;color:var(--mut);font-weight:800;display:block;margin-bottom:6px}
  .f label .opt{color:#C7BCAF;font-weight:700}
  .f input,.f textarea{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  .f input:focus,.f textarea:focus{outline:none;border-color:#F0C3B2}
  .f textarea{min-height:70px;resize:vertical;line-height:1.6}
  .frow{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
  .addph{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:28px;border:2px dashed #E7C9BB;border-radius:16px;background:#FFF8F3;color:var(--acc2);font-weight:800;font-size:14px;font-family:inherit;cursor:pointer}
  .phprev{width:100%;height:160px;border-radius:16px;background-size:cover;background-position:center;background-color:var(--soft);position:relative}
  .phprev .x{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;border:none;background:rgba(46,42,38,.6);color:#fff;font-size:16px;cursor:pointer}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{background:#fff;border:1.5px solid var(--line);color:var(--ink);font-weight:800;font-size:12.5px;padding:8px 13px;border-radius:999px;cursor:pointer;font-family:inherit}
  .chip.best{border-color:#F0C3B2;background:var(--soft);color:var(--acc2)}
  /* discoverability / tags */
  .taggrp{margin-bottom:11px}
  .taglab{font-size:11.5px;color:var(--mut);font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .taglab .b{font-size:10px;background:var(--soft);color:var(--acc2);padding:1px 7px;border-radius:999px}
  .tag{background:#fff;border:1.5px solid var(--line);color:var(--ink);font-weight:700;font-size:12.5px;padding:7px 11px;border-radius:999px;cursor:pointer;font-family:inherit;transition:.12s}
  .tag.sel{background:var(--acc);border-color:var(--acc);color:#fff}
  .meter{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-top:10px}
  .meter .ic{font-size:18px}
  .meter .mt{font-size:12.5px;font-weight:800}
  .meter .ms{font-size:11px;color:var(--mut);font-weight:700}
  .meter.low .mt{color:var(--mut)} .meter.mid .mt{color:var(--acc2)} .meter.good .mt{color:var(--green)}
  .hint{font-size:11.5px;color:var(--mut);font-weight:700;line-height:1.6;margin-top:8px;background:var(--goldbg);border-radius:12px;padding:10px 12px}
  .hint b{color:var(--acc2)}
  .fmtsel{display:flex;gap:8px;flex-wrap:wrap}
  .fmtopt{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;background:#fff;border:1.5px solid var(--line);color:var(--ink);font-weight:800;font-size:12px;padding:11px 4px;border-radius:14px;cursor:pointer;font-family:inherit}
  .fmtopt.on{border-color:var(--acc);background:var(--soft);color:var(--acc2)}
  .fmtopt .rec{font-size:9px;background:var(--acc);color:#fff;padding:1px 6px;border-radius:999px;margin-left:2px}
  .fmtopt.on .rec{background:var(--acc2)}
  .reelchk{background:#FFF8F3;border:1px solid #F3DECF;border-radius:14px;padding:13px;margin-top:11px}
  .rchead{font-size:12.5px;font-weight:800;color:var(--acc2);margin-bottom:9px}
  .rcrow{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;font-weight:700;margin-bottom:8px;cursor:pointer}
  .rcck{width:18px;height:18px;accent-color:var(--acc);flex-shrink:0;margin-top:1px}
  .rcnote{font-size:11px;color:var(--mut);font-weight:700;line-height:1.6;margin-top:6px;border-top:1px dashed #EAD7C8;padding-top:8px}
  .fmtbadge{font-size:10.5px;font-weight:800;color:var(--acc2);background:var(--soft);padding:2px 7px;border-radius:999px;white-space:nowrap}
  .tagcount{font-size:11px;color:var(--mut);font-weight:800;text-align:right;margin-bottom:6px}
  .optlab{font-weight:700;color:var(--mut);font-size:10.5px}
  .chartwrap{position:relative;cursor:crosshair}
  .cguide{position:absolute;top:0;bottom:0;width:2px;background:var(--acc);opacity:.45;display:none;pointer-events:none;transform:translateX(-1px)}
  .ctip{position:absolute;top:-6px;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:10px;padding:6px 11px;font-size:11px;font-weight:700;display:none;pointer-events:none;white-space:nowrap;text-align:center;line-height:1.35;box-shadow:var(--sh2);z-index:5}
  .ctip b{font-size:14px;display:block}.ctip span{opacity:.82;font-size:10px}
  .mgain{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 15px;box-shadow:var(--sh2);margin-top:12px}
  .mglab{font-size:12px;color:var(--mut);font-weight:800;margin-bottom:10px}
  .mgchips{display:flex;gap:10px;flex-wrap:wrap}
  .mgc{flex:1;min-width:62px;text-align:center;background:var(--greenbg);border-radius:12px;padding:9px 6px}
  .mgc b{font-size:17px;color:var(--green);font-weight:800;display:block;line-height:1}
  .mgc span{font-size:11px;color:var(--mut);font-weight:800}
  .abs{margin-top:22px}
  .abk{font-size:13px;font-weight:800;color:var(--acc2);margin-bottom:9px;letter-spacing:.02em}
  .ap{font-size:13.5px;color:#4a423b;line-height:1.9}
  .apoints{list-style:none;display:flex;flex-direction:column;gap:11px}
  .apoints li{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 15px;box-shadow:var(--sh2)}
  .apoints li b{display:block;font-size:14px;margin-bottom:3px}
  .apoints li span{font-size:12.5px;color:var(--mut);font-weight:700;line-height:1.7}
  .ahow{padding-left:20px;font-size:13.5px;color:#4a423b;line-height:2}
  .ahow li{margin-bottom:3px}
  .row2{display:flex;gap:10px;margin-top:8px}
  .btn{flex:1;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer}
  .btn.go{background:var(--acc);color:#fff}.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
  .demo{font-size:10.5px;color:var(--mut);font-weight:700;text-align:center;line-height:1.6;margin-top:18px;padding:0 10px}
  .toast{position:fixed;bottom:150px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:.3s;z-index:60;pointer-events:none;max-width:90%;text-align:center}
  .toast.show{opacity:1}
  /* ===== PC（広い画面）= 横並びダッシュボードで"より便利"に ===== */
  @media(min-width:900px){
    body{background:#EBE1D0}
    .phone{max-width:1080px;background:var(--bg);min-height:auto;margin:26px auto;border-radius:28px;box-shadow:0 22px 64px rgba(92,64,44,.16)}
    .scr{padding:26px 32px 40px}
    .tabbar{display:none}
    .addbtn{display:none!important}
    .dtop{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}
    .addbtn-pc{background:var(--acc);color:#fff;border:none;font-family:inherit;font-weight:800;font-size:15px;padding:13px 24px;border-radius:999px;box-shadow:0 8px 20px rgba(224,121,94,.4);cursor:pointer;display:flex;align-items:center;gap:7px}
    .addbtn-pc:active{transform:scale(.97)}
    .dash{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:28px;align-items:start}
    .dcol{min-width:0}
    .dlabel{font-size:13px;font-weight:800;color:var(--acc2);margin-bottom:13px;display:flex;align-items:center;gap:7px;letter-spacing:.03em;border-bottom:1px solid var(--line);padding-bottom:10px}
    .dcol .sechead:first-of-type{margin-top:6px}
    .ov{align-items:center}
    .sheet{border-radius:24px;max-width:480px;margin:0 16px;max-height:88vh}
    .dabout{max-width:760px;margin:0 auto}
  }
</style>
</head>
<body>
<div class="phone">
  <div class="scr" id="scr"></div>
  <div class="tabbar">
    <button class="tab on" data-t="sched" onclick="go('sched')"><span class="ic">📅</span>予約</button>
    <button class="tab" data-t="grow" onclick="go('grow')"><span class="ic">🌱</span>のび</button>
    <button class="tab" data-t="about" onclick="go('about')"><span class="ic">ℹ️</span>このツール</button>
  </div>
</div>
<button class="addbtn" id="addbtn" onclick="openPost()"><span style="font-size:18px">＋</span>投稿を予約する</button>

<div class="ov" id="ov">
  <div class="sheet">
    <h3 id="shTitle">投稿を予約</h3>
    <div class="shsub">リール（動画）を軸に。形式を選んで、本文を入れるだけ。</div>
    <div class="f"><label>形式 <span class="opt">— 新しいお客さんに一番届くのは「リール」です</span></label>
      <div class="fmtsel" id="m_fmt">
        <button type="button" class="fmtopt on" data-v="リール" onclick="selFmt(this)">🎬 リール<span class="rec">おすすめ</span></button>
        <button type="button" class="fmtopt" data-v="カルーセル" onclick="selFmt(this)">🖼 カルーセル</button>
        <button type="button" class="fmtopt" data-v="写真" onclick="selFmt(this)">📷 写真</button>
      </div>
      <div id="m_reelchk"></div>
    </div>
    <div class="f"><label>写真・動画 <span class="opt">（リールは動画）</span></label>
      <input type="file" id="m_file" accept="image/*,video/*" onchange="pickPhoto(event)" style="display:none">
      <div id="m_phwrap"></div>
    </div>
    <div class="f"><label>本文</label><textarea id="m_cap" placeholder="お客さまに伝えたいこと"></textarea></div>
    <div class="f">
      <label>ハッシュタグ <span class="opt">（任意・補助・5個まで）</span></label>
      <div id="m_tags"></div>
      <div class="hint">ハッシュタグは“補助”です。新しい人に届くかは、<b>リールと本文の言葉</b>で決まります。地元のタグ（例 #西荻窪カフェ）を入れておけば十分。</div>
    </div>
    <div class="f"><label>お店のエリア <span class="opt">（地元タグに使います）</span></label>
      <input id="m_area" placeholder="例）西荻窪" oninput="renderTags()"></div>
    <div class="f"><label>タイトル <span class="opt">（任意・自分用メモ）</span></label><input id="m_theme" placeholder="例）今週のおすすめ"></div>
    <div class="f"><label>いつ出す？</label>
      <div class="frow"><input type="date" id="m_date"><input type="time" id="m_time" value="12:00"></div>
      <div class="chips" id="m_chips" style="margin-top:11px"></div>
      <div class="note">※ 時間はあくまで目安。<b>あなたのインサイトの「フォロワーがいる時間」</b>が一番正確です。</div>
    </div>
    <div class="row2">
      <button class="btn ghost" onclick="closeOv()">やめる</button>
      <button class="btn go" id="shSave" onclick="savePost()">予約する</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const KEY='kotsukotsu_v3';
const TODAY='2026-06-29'; // 月曜
let tab='sched', editId=null, PHOTO='', TAGSEL=[], FMT='リール';
const REEL_TIPS=['縦型（9:16）で撮る','最初の3秒で“おっ”と思わせる','字幕（テロップ）を入れる','友達に送りたくなる／保存したくなる中身か'];
function fmtIcon(f){return ({'リール':'🎬','カルーセル':'🖼','写真':'📷'})[f]||'';}
function fmtBadge(f){return f?`<span class="fmtbadge">${fmtIcon(f)} ${f}</span>`:'';}
const img=u=>`https://images.unsplash.com/${u}?w=320&q=80`;
const TAGS_BASE=['#カフェ','#コーヒー','#カフェ巡り'];
const TAGS_THEME=['#おうちカフェ','#コーヒーのある暮らし','#カフェ好きな人と繋がりたい','#今日のおやつ','#リラックスタイム'];
const WEEK_GOAL=3;

let store=load();
function load(){
  const raw=localStorage.getItem(KEY);
  if(raw){try{return JSON.parse(raw);}catch(e){}}
  return {
    shop:{name:'まちかど珈琲',handle:'@machikado.coffee',area:'西荻窪',avatar:img('photo-1447933601403-0c6688de566e')},

function weekKey(when){const d=new Date(when.slice(0,10)+'T00:00');const off=(d.getDay()+6)%7;d.setDate(d.getDate()-off);return`${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}-${('0'+d.getDate()).slice(-2)}`;}
function dayWord(when){const d=new Date(when.slice(0,10)+'T00:00'),t=new Date(TODAY+'T00:00');const diff=Math.round((d-t)/86400000);
  if(diff===0)return'きょう';if(diff===1)return'あした';if(diff===2)return'あさって';if(diff>2)return`あと${diff}日`;return`${d.getMonth()+1}/${d.getDate()}`;}
function whenLabel(when){const d=new Date(when);return`${d.getMonth()+1}/${d.getDate()} ${timeWord(d.getHours())}`;}
function streakWeeks(){const wk=new Set(store.posts.map(p=>weekKey(p.when)));let n=0,c=new Date(TODAY+'T00:00');const off=(c.getDay()+6)%7;c.setDate(c.getDate()-off);
  while(true){const k=`${c.getFullYear()}-${('0'+(c.getMonth()+1)).slice(-2)}-${('0'+c.getDate()).slice(-2)}`;if(wk.has(k)){n++;c.setDate(c.getDate()-7);}else break;}return n;}

function lineChart(s){
  const W=380,H=120,pad=8,vals=s.map(x=>x.foll),mn=Math.min(...vals),mx=Math.max(...vals);
  const x=i=>pad+i*(W-pad*2)/(s.length-1),y=v=>H-pad-(mx===mn?H/2:(v-mn)/(mx-mn)*(H-pad*2));
  const pts=vals.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E0795E" stop-opacity=".22"/><stop offset="1" stop-color="#E0795E" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${pad},${H-pad} ${pts} ${W-pad},${H-pad}" fill="url(#g)"/>
    <polyline points="${pts}" fill="none" stroke="#E0795E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${x(vals.length-1).toFixed(1)}" cy="${y(vals[vals.length-1]).toFixed(1)}" r="4.5" fill="#C85B43"/></svg>`;
}
function chartHover(e){

  let frac=(cx/r.width*W-pad)/(W-2*pad);frac=Math.max(0,Math.min(1,frac));
  const i=Math.round(frac*(n-1)),xPx=(pad+i*(W-2*pad)/(n-1))/W*r.width;
  const g=document.getElementById('cguide'),t=document.getElementById('ctip');
  g.style.left=xPx+'px';g.style.display='block';
  const d=new Date(s[i].d+'T00:00'),dl=i>0?s[i].foll-s[i-1].foll:0;
  t.innerHTML=`<b>${fmtNum(s[i].foll)}人</b><span>${d.getMonth()+1}/${d.getDate()}${i>0?` ・前週+${fmtNum(dl)}`:''}</span>`;
  t.style.left=Math.max(46,Math.min(r.width-46,xPx))+'px';t.style.display='block';
}

  if(p){const d=new Date(p.when);document.getElementById('m_date').value=`${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}-${('0'+d.getDate()).slice(-2)}`;document.getElementById('m_time').value=`${('0'+d.getHours()).slice(-2)}:${('0'+d.getMinutes()).slice(-2)}`;}
  else{document.getElementById('m_date').value=TODAY;document.getElementById('m_time').value='12:00';}
  setPhoto(p?(p.img||''):'');renderTags();
  document.querySelectorAll('#m_fmt .fmtopt').forEach(x=>x.classList.toggle('on',x.dataset.v===FMT));renderReelChk();
  document.getElementById('m_chips').innerHTML=[['あさ','08:00'],['おひる','12:00'],['ゆうがた','18:00'],['よる','21:00']]
    .map(c=>`<button type="button" class="chip${c[1]==='12:00'?' best':''}" onclick="document.getElementById('m_time').value='${c[1]}'">${c[0]} ${c[1]}</button>`).join('');
  document.getElementById('ov').classList.add('show');
}
function closeOv(){editId=null;document.getElementById('ov').classList.remove('show');}
function savePost(){
  const theme=document.getElementById('m_theme').value.trim()||'（無題）';
  const cap=document.getElementById('m_cap').value;
  const when=document.getElementById('m_date').value+'T'+document.getElementById('m_time').value;
  const area=document.getElementById('m_area').value.trim();if(area)store.shop.area=area;
  if(editId){const p=store.posts.find(x=>x.id===editId);if(p){p.theme=theme;p.fmt=FMT;p.cap=cap;p.when=when;p.img=PHOTO;p.tags=TAGSEL.slice();}save();closeOv();render();toast('保存しました');return;}
  const id=Math.max(0,...store.posts.map(p=>p.id))+1;
  store.posts.push({id,theme,fmt:FMT,cap,when,posted:false,img:PHOTO,reach:0,saves:0,tags:TAGSEL.slice()});
  save();closeOv();go('sched');toast('予約しました🌱 続けていきましょう');
}
let tT;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2000);}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeOv();});
render();
</script>
</body>
